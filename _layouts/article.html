---
layout: default
---

{% assign rubrik_slug = page.rubrik | downcase | replace: ' ', '-' | replace: '&', '' | replace: '--', '-' %}

<!-- NewsArticle Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": "{{ page.title | escape }}",
  "description": "{{ page.description | default: page.excerpt | strip_html | strip_newlines | escape }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "url": "{{ page.url | absolute_url }}",
  "inLanguage": "id",
  "author": {
    "@type": "Person",
    "name": "{{ page.author | default: 'Fariz Armesta' }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Majalah Digital Sophia",
    "url": "https://discoversophia.id",
    "logo": {
      "@type": "ImageObject",
      "url": "https://discoversophia.id/assets/images/logo-sophia.png",
      "width": 200,
      "height": 60
    }
  }{% if page.cover_image %},
  "image": {
    "@type": "ImageObject",
    "url": "{% if page.cover_image contains 'http' %}{{ page.cover_image }}{% else %}{{ page.cover_image | absolute_url }}{% endif %}"
  }{% endif %}
}
</script>

<!-- BreadcrumbList Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "https://discoversophia.id"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Artikel",
      "item": "https://discoversophia.id/artikel"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.rubrik }}",
      "item": "https://discoversophia.id/artikel?rubrik={{ rubrik_slug }}"
    },
    {
      "@type": "ListItem",
      "position": 4,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
  ]
}
</script>
