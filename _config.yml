title: Sophia
description: Sophia adalah majalah digital sains, teknologi, dan budaya untuk keluarga Indonesia. Belajar bersama, mempersiapkan masa depan dengan pengetahuan dan rasa ingin tahu.
baseurl: ""
url: "https://discoversophia.id"

tagline: "Rasa Ingin Tahu, Awal Pembelajaran"
email: sophia.hermosa.id@gmail.com

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /artikel/:slug/

# Allow raw HTML inside markdown (needed for Laboratorium code blocks)
kramdown:
  input: GFM
  hard_wrap: false
  parse_block_html: true

collections:
  articles:
    output: true
    permalink: /artikel/:slug/

defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: article

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
