<div class="auth-overlay" id="auth-overlay" onclick="closeAuthModal()"></div>

<div class="auth-modal" id="auth-modal" role="dialog" aria-modal="true">
  <button class="auth-close" onclick="closeAuthModal()" aria-label="Tutup">&times;</button>

  <div class="auth-brand">
    <div class="auth-logo">S</div>
    <span class="auth-logo-name">sophia</span>
  </div>

  <!-- LOGIN PANEL -->
  <div class="auth-panel" id="panel-login">
    <h2 class="auth-title">Selamat datang kembali</h2>
    <p class="auth-subtitle">Masuk untuk mengakses semua artikel Sophia</p>
    <div class="auth-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="nama@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Password kamu" autocomplete="current-password">
      </div>
      <p class="auth-error" id="login-error"></p>
      <button class="btn-auth-submit" onclick="handleLogin()">Log In</button>
    </div>
    <p class="auth-switch">Belum punya akun? <a href="#" onclick="switchPanel('register'); return false;">Daftar gratis</a></p>
  </div>

  <!-- REGISTER PANEL -->
  <div class="auth-panel" id="panel-register" style="display:none;">
    <h2 class="auth-title">Bergabung dengan Sophia</h2>
    <p class="auth-subtitle">Gratis. Akses semua artikel dan edisi terbuka.</p>
    <div class="auth-form">
      <div class="form-group">
        <label for="reg-name">Nama</label>
        <input type="text" id="reg-name" placeholder="Nama kamu" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="nama@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Minimal 6 karakter" autocomplete="new-password">
      </div>
      <p class="auth-error" id="register-error"></p>
      <button class="btn-auth-submit" onclick="handleRegister()">Daftar Gratis</button>
    </div>
    <p class="auth-switch">Sudah punya akun? <a href="#" onclick="switchPanel('login'); return false;">Log in</a></p>
  </div>

  <!-- SUCCESS PANEL -->
  <div class="auth-panel" id="panel-success" style="display:none;">
    <div class="auth-success-icon">✓</div>
    <h2 class="auth-title">Selamat datang!</h2>
    <p class="auth-subtitle" id="success-message">Kamu sudah masuk ke Sophia.</p>
    <button class="btn-auth-submit" onclick="closeAuthModal()">Mulai Membaca</button>
  </div>

</div>
